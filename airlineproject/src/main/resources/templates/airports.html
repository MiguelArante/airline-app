<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Information System</title>
<link href="//cdn.datatables.net/2.3.7/css/dataTables.dataTables.min.css" rel="stylesheet"/>

<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
<script src="//cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
</head>
<body>
 <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
     <a class="navbar-brand" th:href="@{/}">AirLabs</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/airlines}" th:text="Airlines">Airline</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/flights}" th:text="Flights">Features</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/airports}" th:text="Airports">Pricing</a>
        </li>
       
      </ul>
    </div>
  </div>
</nav>


    <h1 class="text-center m-5 p-5">Airports</h1>
   
   
    
<div class="container text-center">
    <table class="table table-striped" id="myTable">
  <thead>
    <tr>
      <th scope="col">Airline Name</th>
      <th scope="col">IATA Code</th>
      <th scope="col">Country</th>
      <th scope="col">Latitude</th>
      <th scope="col">Longitude</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="airport : ${airports}">
      <td th:text="${airport.name}">1</td>
      <td th:text="${airport.iata_code}">PAL</td>
      <td th:text="${airport.country_code}"></td>
      <td th:text="${airport.lat}"></td>
      <td th:text="${airport.lng}"></td>
    </tr>
  </tbody>
</table>
    </div>
    
</body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
    $(document).ready( function () {
    $('#myTable').DataTable();
} );
</script>

</html>
